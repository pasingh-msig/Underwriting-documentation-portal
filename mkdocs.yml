      - Risk Register Template: templates/risk-register-template.md
      - Decision Log Template: templates/decision-log-template.md
      - Policy Mapping Template: templates/policy-mapping-template.md
      - Cutover Readiness Template: templates/cutover-readiness-template.md
      - Benefits Realization Template: templates/benefits-realization-template.md
      - Audit RACI Template: templates/audit-raci-template.md
      - Legacy Retirement and SOR Mapping Template: templates/legacy-retirement-and-sor-mapping-template.md
      - Business Line Business View Template: templates/business-line-business-view-template.md
      - Business Line Technical View Template: templates/business-line-technical-view-template.md
      - Product Business View Template: templates/product-business-view-template.md
      - Product Technical View Template: templates/product-technical-view-template.md
