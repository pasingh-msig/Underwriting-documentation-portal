              - Forms Governance: initiatives/u360/common-capabilities/forms-governance.md
              - Audit Trail: initiatives/u360/common-capabilities/audit-trail.md
              - Legal Notice Odin: initiatives/u360/common-capabilities/legal-notice-odin.md
              - RBAC Multi Tenancy: initiatives/u360/common-capabilities/rbac-multi-tenancy.md
              - AI Driven Unified Interface Integration: initiatives/u360/common-capabilities/ai-driven-unified-interface-integration.md
              - Shared Referral Workflow: initiatives/u360/common-capabilities/shared-referral-workflow.md

  - Templates:
